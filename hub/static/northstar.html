<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>North Star</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<style>
:root {
  --bg: #faf9f6; --bg-deep: #f0ede7; --panel: #fff; --panel-border: #e4dfd5;
  --panel-soft: #f5f2ec; --text: #1f1c1a; --text-soft: #4a4540; --text-dim: #8a8278;
  --accent: #cc785c; --accent-deep: #a34b2c; --accent-soft: #f5e6de;
  --green: #3d8b5e; --green-soft: #e8f5ee;
  --yellow: #b8860b; --yellow-soft: #fef9e7;
  --red: #c0392b; --red-soft: #fdf0ef;
  --blue: #2c6fad; --blue-soft: #e8f0fb;
  --serif: "Fraunces", Georgia, serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  --drawer-w: 420px;
  --status-behind: var(--red);
  --status-on-track: var(--green);
  --status-achieved: var(--accent);
}
[data-theme="dark"] {
  --bg: #181614; --bg-deep: #111009; --panel: #222019; --panel-border: #333028;
  --panel-soft: #1e1c1a; --text: #e8e0d6; --text-soft: #b0a89e; --text-dim: #6b6358;
  --accent: #cc785c; --accent-deep: #e8926e; --accent-soft: #2a1e17;
  --green: #4caf78; --green-soft: #0e2318;
  --yellow: #d4a017; --yellow-soft: #1e1800;
  --red: #e05252; --red-soft: #250e0e;
  --blue: #5b9bd5; --blue-soft: #0d1e30;
}
:root {
  --status-paused: var(--text-dim);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); overflow: hidden; }
body { font: 14px/1.55 var(--sans); color: var(--text-soft); -webkit-font-smoothing: antialiased; }

/* ── Layout ─────────────────────────────────────────────────────────────────── */
.layout { display: block; height: 100vh; overflow-y: auto; }
.main-area { width: 100%; }

/* ── Header ─────────────────────────────────────────────────────────────────── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--panel-border);
  background: var(--bg); position: sticky; top: 0; z-index: 10;
  white-space: nowrap; min-height: 48px;
}
.header-left { display: flex; align-items: baseline; gap: 12px; }
.page-title { font-family: var(--serif); font-size: 18px; font-weight: 500; color: var(--text); white-space: nowrap; }
.page-sub { font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.header-right { display: flex; align-items: center; gap: 8px; }
.refresh-btn {
  background: none; border: 1px solid var(--panel-border); border-radius: 4px;
  padding: 4px 10px; font-size: 11px; font-family: var(--mono); cursor: pointer;
  color: var(--text-dim); transition: all .12s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.theme-btn {
  background: none; border: 1px solid var(--panel-border); border-radius: 4px;
  padding: 4px 8px; font-size: 13px; cursor: pointer; line-height: 1;
  color: var(--text-dim); transition: all .12s;
}
.theme-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
.updated-at { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }

/* ── Node graph canvas ──────────────────────────────────────────────────────── */
.grid-wrap { padding: 0; overflow: hidden; position: relative; }
#ns-graph-canvas {
  width: 100%; height: calc(100vh - 120px);
  background: var(--bg);
}
[data-theme="dark"] #ns-graph-canvas { background: #181614; }

/* vis.js manipulation toolbar override */
.vis-manipulation { background: var(--panel-soft) !important; border-bottom: 1px solid var(--panel-border) !important; font-family: var(--mono) !important; font-size: 11px !important; }
.vis-button { color: var(--text-dim) !important; border-color: var(--panel-border) !important; }
.vis-button:hover { color: var(--accent) !important; border-color: var(--accent) !important; }
.vis-button.vis-connect { background: var(--accent-soft) !important; }

/* Graph toolbar at bottom */
.ns-graph-toolbar {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 10;
}
.ns-graph-btn {
  background: var(--panel); border: 1px solid var(--panel-border); border-radius: 6px;
  padding: 5px 12px; font-family: var(--mono); font-size: 11px; cursor: pointer;
  color: var(--text-dim); transition: all .12s; white-space: nowrap;
}
.ns-graph-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.ns-graph-btn.active { border-color: var(--accent); color: var(--accent-deep); background: var(--accent-soft); }

/* Right-click context menu */
.ns-ctx-menu {
  position: fixed; z-index: 1000; display: none;
  background: var(--panel); border: 1px solid var(--panel-border);
  border-radius: 8px; box-shadow: 0 8px 24px rgba(31,28,26,.15);
  overflow: hidden; min-width: 160px;
}
.ns-ctx-menu.show { display: block; }
.ns-ctx-item {
  padding: 8px 14px; font-family: var(--mono); font-size: 11px;
  color: var(--text-soft); cursor: pointer; white-space: nowrap;
  transition: background .08s;
}
.ns-ctx-item:hover { background: var(--panel-soft); color: var(--text); }
.ns-ctx-item.danger { color: var(--red); }
.ns-ctx-item.danger:hover { background: var(--red-soft); }
.ns-ctx-sep { height: 1px; background: var(--panel-border); margin: 2px 0; }

/* Add project modal */
.ns-add-modal {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(31,28,26,.3); align-items: center; justify-content: center;
}
.ns-add-modal.show { display: flex; }
.ns-add-card {
  background: var(--panel); border: 1px solid var(--panel-border);
  border-radius: 10px; padding: 24px 28px; width: 380px;
  box-shadow: 0 16px 48px rgba(31,28,26,.18);
}
.ns-add-title { font-family: var(--serif); font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 16px; }
.ns-add-field { margin-bottom: 12px; }
.ns-add-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing:.06em; color: var(--text-dim); display: block; margin-bottom: 4px; }
.ns-add-input {
  width: 100%; box-sizing: border-box; padding: 8px 10px;
  background: var(--bg-deep); border: 1px solid var(--panel-border); border-radius: 6px;
  font-family: var(--mono); font-size: 12px; color: var(--text); outline: none;
  transition: border-color .12s;
}
.ns-add-input:focus { border-color: var(--accent); }
.ns-add-hint { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 3px; }
.ns-add-btns { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
.ns-add-cancel { background: none; border: 1px solid var(--panel-border); border-radius: 6px; padding: 6px 14px; font-family: var(--mono); font-size: 11px; cursor: pointer; color: var(--text-dim); }
.ns-add-submit { background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 6px; padding: 6px 14px; font-family: var(--mono); font-size: 11px; cursor: pointer; color: var(--accent-deep); }
.ns-add-submit:hover { background: var(--accent); color: #fff; }

/* Table column styles */
.col-num  { width: 32px; color: var(--text-dim); font-family: var(--mono); font-size: 11px; text-align: right; padding-right: 6px; }
.col-drag { width: 22px; text-align: center; }
.col-cat  { width: 72px; font-family: var(--mono); font-size: 10px; }
.cat-pill { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px;
  font-family: var(--mono); background: var(--panel-soft); border: 1px solid var(--panel-border);
  color: var(--text-dim); white-space: nowrap; }
.col-sess { width: 68px; }
.sess-dot { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; }
.sess-indicator { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sess-active  .sess-indicator { background: var(--green); box-shadow: 0 0 4px var(--green); }
.sess-idle    .sess-indicator { background: var(--yellow); }
.sess-none    .sess-indicator { background: var(--panel-border); }
.drag-handle { cursor: grab; color: var(--text-dim); font-size: 14px; line-height: 1; user-select: none; }
.drag-handle:active { cursor: grabbing; }
.col-name { min-width: 110px; }
.col-name .row-name { font-family: var(--serif); font-size: 15px; font-weight: 500; color: var(--text); }
.col-status { width: 80px; }
.col-metric { min-width: 100px; color: var(--text-soft); font-size: 11px; max-width: 140px; }
.col-progress { width: 140px; }
.progress-wrap { display: flex; align-items: center; gap: 6px; }
.progress-bar { flex: 1; height: 4px; background: var(--panel-border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }
.progress-num { font-family: var(--mono); font-size: 10px; color: var(--text-dim); white-space: nowrap; min-width: 28px; }
.col-gap { width: 90px; font-family: var(--mono); font-size: 11px; white-space: nowrap; }
.col-step { min-width: 140px; font-size: 11px; color: var(--text-soft); }
.col-date { width: 58px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); white-space: nowrap; }
.row-status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; flex-shrink: 0; }
.status-label { font-family: var(--mono); font-size: 10px; display: flex; align-items: center; }
.status-label.behind   { color: var(--red); }
.status-label.on-track { color: var(--green); }
.status-label.achieved { color: var(--accent); }
.status-label.paused   { color: var(--text-dim); }

@media (max-width: 640px) {
  .grid-wrap { padding: 8px 10px; }
  .ns-lane-label { width: 50px; font-size: 8px; }
  .ns-node { width: 130px; }
  .ns-node-name { font-size: 12px; }
}

/* ── Milestone Creator ────────────────────────────────────────────────────── */
.ms-item {
  display: flex; align-items: flex-start; gap: 6px; padding: 5px 0;
  border-bottom: 1px solid var(--panel-border);
}
.ms-item:last-child { border-bottom: none; }
.ms-item.layer-1 { padding-left: 18px; }
.ms-toggle {
  cursor: pointer; font-size: 13px; line-height: 1; flex-shrink: 0;
  color: var(--text-dim); background: none; border: none; padding: 0;
  margin-top: 1px; transition: color .1s;
}
.ms-toggle.done { color: var(--green); }
.ms-toggle:hover { color: var(--accent); }
.ms-text-wrap { flex: 1; min-width: 0; }
.ms-text {
  display: block; width: 100%; overflow: visible;
  font-size: 12px; color: var(--text); line-height: 1.4; cursor: text;
  word-break: break-word; overflow-wrap: anywhere; outline: none; border-radius: 2px;
}
.ms-text.done { color: var(--text-dim); text-decoration: line-through; }
.ms-text:focus { background: var(--bg-deep); padding: 1px 3px; margin: -1px -3px; }
.ms-ack {
  font-size: 10px; font-family: var(--mono); flex-shrink: 0;
  margin-top: 2px; white-space: nowrap; min-width: 52px; text-align: right;
}
.ms-ack.acked { color: var(--green); }
.ms-ack.unread { color: var(--text-dim); }
.ms-del {
  cursor: pointer; font-size: 12px; color: var(--text-dim); flex-shrink: 0;
  background: none; border: none; padding: 0; margin-top: 1px;
  opacity: 0; transition: opacity .1s;
}
.ms-item:hover .ms-del { opacity: 1; }
.ms-del:hover { color: var(--red); }
.ms-add-sub {
  font-size: 10px; font-family: var(--mono); color: var(--text-dim);
  background: none; border: none; cursor: pointer; padding: 0;
  margin-top: 2px; display: block;
}
.ms-add-sub:hover { color: var(--accent); }

/* ── Project card ────────────────────────────────────────────────────────────── */
.card {
  background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px;
  cursor: pointer; transition: box-shadow .12s, border-color .12s; overflow: hidden;
}
.card:hover { box-shadow: 0 3px 12px rgba(31,28,26,.08); }
.card.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

/* Status bar at top of card */
.card-status-bar { height: 3px; width: 100%; }
.card-status-bar.behind   { background: var(--red); }
.card-status-bar.on-track { background: var(--green); }
.card-status-bar.achieved { background: var(--accent); }
.card-status-bar.paused   { background: var(--text-dim); }

.card-inner { padding: 16px 18px 14px; }
.card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-name { font-family: var(--serif); font-size: 17px; font-weight: 500; color: var(--text); }
.card-status-pill { font-size: 10px; font-family: var(--mono); padding: 2px 8px;
  border-radius: 8px; font-weight: 500; }
.card-status-pill.behind   { background: var(--red-soft);    color: var(--red); }
.card-status-pill.on-track { background: var(--green-soft);  color: var(--green); }
.card-status-pill.achieved { background: var(--accent-soft); color: var(--accent-deep); }
.card-status-pill.paused   { background: var(--bg-deep);     color: var(--text-dim); border: 1px solid var(--panel-border); }

/* Gauge */
.gauge-wrap { display: flex; align-items: flex-end; gap: 14px; margin-bottom: 14px; }
.gauge-svg-wrap { flex-shrink: 0; }
.gauge-svg { display: block; }
.gauge-track { fill: none; stroke: var(--bg-deep); stroke-width: 9; stroke-linecap: round; }
.gauge-fill  { fill: none; stroke-width: 9; stroke-linecap: round; transition: stroke-dasharray .6s ease; }
.gauge-center-text { font-family: var(--serif); }
.gauge-value { font-size: 13px; font-weight: 500; fill: var(--text); }
.gauge-label { font-size: 7px; fill: var(--text-dim); font-family: var(--mono); }

.gauge-aside { flex: 1; }
.gauge-metric { font-size: 12px; color: var(--text-soft); line-height: 1.4; margin-bottom: 8px; }
.gauge-numbers { display: flex; align-items: baseline; gap: 5px; }
.gauge-current { font-family: var(--mono); font-size: 20px; color: var(--text); font-weight: 400; }
.gauge-sep { color: var(--text-dim); font-size: 13px; }
.gauge-target { font-family: var(--mono); font-size: 13px; color: var(--text-dim); }
.gauge-deadline { font-size: 10px; color: var(--text-dim); font-family: var(--mono); margin-top: 5px; }

/* Milestone pipeline */
.ms-pipeline { display: flex; align-items: center; gap: 0; margin-bottom: 12px; overflow: hidden; }
.ms-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.ms-dot-wrap { display: flex; align-items: center; }
.ms-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--panel-border); background: var(--bg);
}
.ms-dot.done    { background: var(--green);  border-color: var(--green); }
.ms-dot.active  { background: var(--accent); border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft); }
.ms-dot.pending { background: var(--bg-deep); border-color: var(--panel-border); }
.ms-line { flex: 1; height: 2px; min-width: 8px; max-width: 28px;
  background: var(--panel-border); margin: 0 2px; margin-bottom: 14px; }
.ms-line.done { background: var(--green); }
.ms-pipeline .ms-text { font-size: 9px; font-family: var(--mono); color: var(--text-dim);
  max-width: 60px; text-align: center; line-height: 1.3; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; }
.ms-pipeline .ms-text.done { color: var(--green); }
.ms-pipeline .ms-text.active { color: var(--accent); font-weight: 500; }

/* ── Current step strip on card ── */
.card-current-step {
  display: flex; align-items: center; justify-content: space-between;
  margin: 6px 0 4px; padding: 5px 8px;
  background: var(--bg-deep); border-radius: 4px;
  border-left: 2px solid var(--accent);
  gap: 6px; min-width: 0; overflow: hidden;
}
.cs-main { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; overflow: hidden; }
.cs-gap {
  font-size: 11px; font-family: var(--mono); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cs-step {
  font-size: 10px; font-family: var(--mono); color: var(--text-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.cs-date {
  font-size: 10px; font-family: var(--mono); color: var(--text-dim);
  flex-shrink: 0; white-space: nowrap;
}

.card-footer { display: flex; align-items: center; justify-content: space-between; }
.ms-summary { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
.card-arrow { font-size: 12px; color: var(--text-dim); }
.card:hover .card-arrow, .card.active .card-arrow { color: var(--accent); }

/* ── Responsive — mobile/tablet ────────────────────────────────────────────── */
@media (max-width: 640px) {
  /* Keep html/body overflow:hidden — .main-area is the scroll container (matches desktop pattern) */
  .layout { flex-direction: column; height: 100vh; }
  .main-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;  /* smooth momentum scroll on iOS */
  }

  /* Grid: single column on mobile */
  .grid { grid-template-columns: 1fr; }
  .grid-wrap { padding: 12px 14px; }

  /* Card: compact */
  .card-inner { padding: 13px 14px 12px; }

  /* Drawer: bottom sheet overlay on mobile */
  .drawer-area {
    position: fixed !important;
    bottom: 0; left: 0; right: 0;
    width: 100% !important;
    height: 0;
    border-left: none !important;
    border-top: 2px solid var(--panel-border);
    z-index: 50;
  }
  .drawer-area.open { height: 78vh; }
  .drawer { width: 100%; border-radius: 12px 12px 0 0; }
  .drawer-header { border-radius: 12px 12px 0 0; padding: 14px 16px; }
  .drawer-scroll { padding: 14px 16px; }

  /* Add drag handle indicator on drawer */
  .drawer-header::before {
    content: '';
    display: block;
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--panel-border); margin: 0 auto 10px;
  }

  /* Gauge: full width stacked */
  .gauge-wrap { flex-direction: column; align-items: center; gap: 8px; }
  .gauge-aside { width: 100%; text-align: center; }
  .gauge-numbers { justify-content: center; }
  .gauge-deadline { text-align: center; }

  /* Card status pill: smaller */
  .card-status-pill { font-size: 9px; padding: 2px 6px; }

  /* Card name: slightly smaller */
  .card-name { font-size: 15px; }

  /* D-gauge numbers: shrink */
  .d-current { font-size: 26px; }
  .d-target  { font-size: 15px; }

  /* Milestone pipeline: shrink dots/lines */
  .ms-dot { width: 8px; height: 8px; }
  .ms-line { min-width: 6px; max-width: 16px; }
  .ms-pipeline .ms-text { font-size: 8px; max-width: 50px; }

  header { padding: 10px 14px; min-height: 44px; }
  .page-title { font-size: 16px; }
  .page-sub { display: none; }
  .updated-at { display: none; }
}

/* Drawer backdrop — tap outside to close on mobile */
.drawer-backdrop {
  display: none;
  position: fixed; inset: 0; z-index: 49;
  background: rgba(31,28,26,.15);
  /* NO backdrop-filter — causes black screen bug in iframe on Windows Chrome */
}
.drawer-backdrop.show { display: block; }

/* Desktop: backdrop only needed on mobile (drawer is inline on desktop) */
@media (min-width: 641px) {
  .drawer-backdrop { display: none !important; }
}

@media (max-width: 380px) {
  .grid-wrap { padding: 10px; }
  .drawer-area.open { height: 85vh; }
}

/* Desktop: ensure drawer doesn't overflow viewport */
@media (min-width: 641px) {
  .drawer-area.open { max-width: var(--drawer-w); }
}

/* ── Terminal panel inside detail modal ──────────────────────────────────────── */
.dm-terminal {
  display: none; flex-direction: column; flex: 1; overflow: hidden;
  background: #1a1916; border-radius: 0 0 10px 10px;
}
.dm-terminal.show { display: flex; }
.dm-terminal-hdr {
  display: flex; align-items: center; gap: 10px; padding: 8px 14px;
  background: #252220; border-bottom: 1px solid #333; flex-shrink: 0;
}
.dm-terminal-title {
  flex: 1; font-family: var(--mono); font-size: 11px; color: #aaa;
}
.dm-terminal-title span { color: #cc785c; }
.dm-terminal-back {
  background: none; border: 1px solid #444; cursor: pointer; border-radius: 4px;
  color: #888; font-family: var(--mono); font-size: 10px; padding: 2px 8px;
  transition: color .1s, border-color .1s;
}
.dm-terminal-back:hover { color: #ccc; border-color: #666; }
#dm-xterm { flex: 1; overflow: hidden; padding: 2px 4px; }
#dm-xterm .xterm { height: 100%; }
#dm-xterm .xterm-screen { height: 100%; }

/* ── Detail Overlay (centered modal — replaces side drawer) ──────────────────── */
.detail-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(31,28,26,.3); align-items: center; justify-content: center;
  padding: 16px;
}
.detail-overlay.show { display: flex; }

.detail-modal {
  background: var(--panel); border: 1px solid var(--panel-border);
  border-radius: 10px; width: 100%; max-width: 880px; max-height: 90vh;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 20px 60px rgba(31,28,26,.18);
}

/* Header */
.dm-header {
  display: flex; align-items: center; gap: 12px; padding: 16px 22px;
  border-bottom: 1px solid var(--panel-border); flex-shrink: 0;
  background: var(--panel-soft);
}
.dm-title { font-family: var(--serif); font-size: 20px; font-weight: 500; color: var(--text); flex: 1; }
.dm-status-pill { font-size: 10px; font-family: var(--mono); padding: 3px 9px; border-radius: 8px; flex-shrink: 0; }
.dm-status-pill.behind   { background: var(--red-soft);    color: var(--red); }
.dm-status-pill.on-track { background: var(--green-soft);  color: var(--green); }
.dm-status-pill.achieved { background: var(--accent-soft); color: var(--accent-deep); }
.dm-status-pill.paused   { background: var(--bg-deep);     color: var(--text-dim); border: 1px solid var(--panel-border); }
.dm-close { background: none; border: none; cursor: pointer; font-size: 20px;
  color: var(--text-dim); line-height: 1; padding: 0 2px; transition: color .1s; flex-shrink: 0; }
.dm-close:hover { color: var(--accent); }

/* Body — 2 columns */
.dm-body {
  display: grid; grid-template-columns: 58% 42%; flex: 1; overflow: hidden;
}
.dm-left  { overflow-y: auto; padding: 20px 22px; border-right: 1px solid var(--panel-border); -webkit-overflow-scrolling: touch; }
.dm-right { overflow-y: auto; padding: 20px 20px; background: var(--bg); -webkit-overflow-scrolling: touch; }

/* ── Goal hierarchy layers ── */
.dm-layer {
  position: relative; margin-bottom: 8px;
}
/* Vertical connector between layers */
.dm-layer::after {
  content: ''; position: absolute; left: 11px; bottom: -8px; width: 2px; height: 8px;
  background: var(--panel-border);
}
.dm-layer:last-child::after { display: none; }

.dm-layer-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.dm-layer-icon {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; border: 2px solid;
}
.dm-layer-icon.ns    { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-deep); }
.dm-layer-icon.okr   { background: var(--blue-soft, #e8f0fb); border-color: var(--blue, #2c6fad); color: var(--blue, #2c6fad); }
.dm-layer-icon.ms    { background: var(--green-soft); border-color: var(--green); color: var(--green); }
.dm-layer-title {
  font-size: 10px; font-family: var(--mono); text-transform: uppercase;
  letter-spacing: .09em; color: var(--text-dim); font-weight: 600;
}
.dm-layer-count { font-size: 10px; font-family: var(--mono); color: var(--text-dim); margin-left: auto; }
.dm-sync-btn {
  font-size: 10px; font-family: var(--mono); background: none;
  border: 1px solid var(--panel-border); border-radius: 3px;
  padding: 2px 7px; cursor: pointer; color: var(--text-dim);
  transition: all .12s; margin-left: 6px; flex-shrink: 0;
}
.dm-sync-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-soft); }
.dm-sync-btn.loading { opacity: .5; pointer-events: none; }

/* NS gauge section */
.dm-gauge-wrap { display: flex; justify-content: center; margin: 4px 0 6px; }
.dm-ns-meta { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 6px 0; }
.dm-current { font-family: var(--serif); font-size: 28px; font-weight: 400; color: var(--text); }
.dm-sep { color: var(--text-dim); font-size: 16px; }
.dm-target { font-family: var(--mono); font-size: 15px; color: var(--text-dim); }
.dm-metric-name { font-size: 13px; color: var(--text-soft); text-align: center; margin-bottom: 4px; }
.dm-deadline { text-align: center; font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-top: 4px; }

/* OKR items */
.dm-okr-list { display: flex; flex-direction: column; gap: 5px; }
.dm-okr-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 10px; background: var(--bg-deep); border-radius: 4px;
  border-left: 3px solid var(--blue, #2c6fad);
}
.dm-okr-key { font-family: var(--mono); font-size: 10px; font-weight: 600;
  color: var(--blue, #2c6fad); flex-shrink: 0; margin-top: 1px; }
.dm-okr-text { font-size: 12px; color: var(--text-soft); line-height: 1.4; }

/* Milestone items */
.dm-ms-list { display: flex; flex-direction: column; }
.dm-ms-item { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--panel-border); }
.dm-ms-item:last-child { border-bottom: none; }
.dm-ms-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; padding-top: 2px; }
.dm-ms-dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--panel-border); background: var(--bg); flex-shrink: 0; }
.dm-ms-dot.done   { background: var(--green);  border-color: var(--green); }
.dm-ms-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.dm-ms-line { flex: 1; width: 2px; background: var(--panel-border); margin: 3px 4.5px 0; min-height: 12px; }
.dm-ms-line.done { background: var(--green); }
.dm-ms-text { font-size: 12px; color: var(--text-soft); line-height: 1.4; flex: 1; }
.dm-ms-text.done   { color: var(--text-dim); text-decoration: line-through; }
.dm-ms-text.active { color: var(--text); font-weight: 500; }

/* ── Right column (current work + actions) ── */
.dm-section { margin-bottom: 18px; }
.dm-section-label {
  font-size: 10px; font-family: var(--mono); text-transform: uppercase;
  letter-spacing: .09em; color: var(--text-dim); margin-bottom: 8px; display: flex;
  align-items: center; gap: 6px;
}
.dm-section-label .live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  animation: blink 2s ease-in-out infinite; flex-shrink: 0;
}

/* CTX activity strip */
.ctx-strip { display: flex; flex-direction: column; gap: 3px; }
.ctx-item { display: flex; align-items: center; gap: 7px; font-size: 11px;
  font-family: var(--mono); color: var(--text-dim); padding: 2px 0; }
.ctx-heat { width: 24px; height: 3px; border-radius: 1px; background: var(--bg-deep); flex-shrink: 0; }
.ctx-heat-fill { height: 100%; border-radius: 1px; background: var(--accent); }
.ctx-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Inline alignment result */
.align-inline {
  background: var(--bg-deep); border: 1px solid var(--panel-border);
  border-radius: 5px; padding: 10px 12px;
}
.align-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.align-badge { font-size: 10px; font-family: var(--mono); font-weight: 600; padding: 2px 8px; border-radius: 3px; }
.align-badge.ADVANCING { background: var(--green-soft);  color: var(--green); }
.align-badge.NEUTRAL   { background: var(--yellow-soft); color: var(--yellow); }
.align-badge.DIVERGENT { background: var(--red-soft);    color: var(--red); }
.align-score-num { font-family: var(--mono); font-size: 18px; color: var(--text); }
.align-score-sub { font-size: 10px; color: var(--text-dim); }
.align-summary { font-size: 12px; color: var(--text-soft); margin-bottom: 6px; line-height: 1.5; }
.align-redirect-box { background: var(--green-soft); border-left: 3px solid var(--green);
  padding: 6px 9px; border-radius: 0 4px 4px 0; }
.align-redirect-label { font-size: 9px; font-family: var(--mono); text-transform: uppercase;
  letter-spacing: .07em; color: var(--green); margin-bottom: 2px; }
.align-redirect-text { font-size: 11px; color: var(--text-soft); line-height: 1.5; }
.align-gap-box { background: var(--yellow-soft); border-left: 3px solid var(--yellow);
  padding: 6px 9px; border-radius: 0 4px 4px 0; margin-bottom: 5px; }
.align-gap-label { font-size: 9px; font-family: var(--mono); text-transform: uppercase;
  letter-spacing: .07em; color: var(--yellow); margin-bottom: 2px; }
.align-gap-text { font-size: 11px; color: var(--text-soft); }
.align-loading { font-size: 11px; color: var(--text-dim); font-family: var(--mono);
  display: flex; align-items: center; gap: 6px; }

/* Action buttons */
.dm-action-row { display: flex; flex-direction: column; gap: 6px; }
.dm-btn {
  width: 100%; padding: 8px 12px; border-radius: 5px; font-size: 11px;
  font-family: var(--mono); cursor: pointer; transition: all .12s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  border: 1px solid var(--panel-border); background: var(--bg-deep); color: var(--text-soft);
}
.dm-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.dm-btn.loading { opacity: .5; pointer-events: none; }
.dm-btn-refresh { border-color: var(--green); color: var(--green); background: var(--green-soft); }
.dm-btn-refresh:hover { opacity: .85; }

/* Doc note */
.dm-note { font-size: 12px; color: var(--text-soft); line-height: 1.6;
  background: var(--bg-deep); border-radius: 4px; padding: 8px 10px; }

/* Stale warning */
.stale-warn { background: var(--yellow-soft); border: 1px solid rgba(184,134,11,.2);
  border-radius: 4px; padding: 8px 10px; font-size: 12px; color: var(--yellow);
  font-family: var(--mono); margin-bottom: 12px; }

/* Eval results */
.eval-result { margin-top: 8px; }
.eval-overall { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.eval-verdict { font-size: 10px; font-family: var(--mono); font-weight: 600; padding: 2px 8px; border-radius: 3px; }
.eval-verdict.STRONG   { background: var(--green-soft);  color: var(--green); }
.eval-verdict.MODERATE { background: var(--yellow-soft); color: var(--yellow); }
.eval-verdict.WEAK     { background: var(--red-soft);    color: var(--red); }
.eval-lens { margin-bottom: 5px; border: 1px solid var(--panel-border); border-radius: 4px;
  padding: 7px 9px; cursor: pointer; }
.eval-lens:hover { background: var(--panel-soft); }
.eval-lens-head { display: flex; align-items: center; gap: 6px; }
.eval-lens-icon { font-size: 10px; color: var(--text-dim); }
.eval-lens-name { font-size: 10px; font-family: var(--mono); text-transform: uppercase;
  letter-spacing: .06em; color: var(--text); flex: 1; }
.eval-badge { font-size: 9px; font-family: var(--mono); padding: 1px 5px; border-radius: 3px; }
.eval-badge.PASS { background: var(--green-soft); color: var(--green); }
.eval-badge.WARN { background: var(--yellow-soft); color: var(--yellow); }
.eval-badge.FAIL { background: var(--red-soft);   color: var(--red); }
.eval-summary { font-size: 11px; color: var(--text-soft); margin-top: 3px; }
.eval-detail  { font-size: 11px; color: var(--text-dim); margin-top: 3px; display: none; line-height: 1.5; }
.eval-lens.open .eval-detail { display: block; }
.eval-action { margin-top: 6px; background: var(--accent-soft); border: 1px solid rgba(204,120,92,.2);
  border-radius: 4px; padding: 7px 9px; }
.eval-action-label { font-size: 9px; font-family: var(--mono); text-transform: uppercase;
  letter-spacing: .07em; color: var(--accent-deep); margin-bottom: 2px; }
.eval-action-text { font-size: 11px; color: var(--text-soft); }

/* Doc spec link */
.d-doc-btn {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 8px 12px; background: var(--bg-deep); border: 1px solid var(--panel-border);
  border-radius: 5px; font-size: 12px; font-family: var(--mono); cursor: pointer;
  color: var(--text-soft); transition: all .12s; text-align: left;
}
.d-doc-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.d-doc-path { font-size: 10px; color: var(--text-dim); margin-top: 3px; font-family: var(--mono); }

/* ── Mobile: single-column, full-screen ── */
@media (max-width: 640px) {
  .detail-overlay { padding: 0; align-items: flex-end; }
  .detail-modal { max-width: 100%; border-radius: 12px 12px 0 0; max-height: 92vh; }
  .dm-body { grid-template-columns: 1fr; }
  .dm-left { border-right: none; border-bottom: 1px solid var(--panel-border); }
  .dm-right { background: var(--panel); }
  .dm-header::before {
    content: ''; display: block; width: 36px; height: 4px; border-radius: 2px;
    background: var(--panel-border); margin: 0 auto 8px; position: absolute;
    top: 8px; left: 50%; transform: translateX(-50%);
  }
  .dm-header { padding-top: 20px; position: relative; flex-wrap: wrap; }
}

/* Doc viewer overlay */
.doc-overlay { display: none; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
  background: rgba(31,28,26,.3); z-index: 200; align-items: center; justify-content: center; }
.doc-overlay.show { display: flex; }
.doc-modal { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px;
  padding: 22px 24px; max-width: 680px; width: 92%; max-height: 85vh; overflow: hidden;
  display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(31,28,26,.18); }

/* Doc modal: full-screen on mobile */
@media (max-width: 640px) {
  .doc-overlay { align-items: flex-start; }
  .doc-modal {
    width: 100vw !important; height: 100% !important;
    max-width: 100vw !important; max-height: 100% !important;
    border-radius: 0 !important; margin: 0 !important;
    padding: 16px; box-sizing: border-box;
    overflow-x: hidden !important;
  }
  .doc-modal-body {
    overflow-x: hidden !important;
    max-width: 100% !important;
  }
  /* All content in modal stays within bounds */
  .doc-modal * { max-width: 100%; box-sizing: border-box; }
}
.doc-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.doc-modal-title { font-family: var(--serif); font-size: 16px; font-weight: 500; color: var(--text); }
.doc-modal-close { background: none; border: none; cursor: pointer; font-size: 18px;
  color: var(--text-dim); line-height: 1; }
.doc-modal-path {
  font-size: 10px; color: var(--text-dim); font-family: var(--mono);
  margin-bottom: 14px; word-break: break-all; overflow-wrap: anywhere;
  line-height: 1.5;
}
.doc-modal-body {
  overflow-y: auto; flex: 1; font-size: 13px; line-height: 1.65;
  color: var(--text-soft); font-family: var(--sans);
  word-break: break-word; overflow-wrap: break-word;
  -webkit-overflow-scrolling: touch;
}
.doc-h1 { font-family: var(--serif); font-size: 18px; font-weight: 500;
  color: var(--text); margin: 0 0 14px; letter-spacing: -0.01em; line-height: 1.3; }
.doc-h2 { font-family: var(--serif); font-size: 15px; font-weight: 500;
  color: var(--text); margin: 16px 0 5px; padding-bottom: 4px;
  border-bottom: 1px solid var(--panel-border); }
.doc-h3 { font-size: 11px; font-family: var(--mono); text-transform: uppercase;
  letter-spacing: .08em; color: var(--text-dim); margin: 12px 0 4px; }
.doc-gap  { height: 8px; }
.doc-li   { padding-left: 12px; position: relative; margin: 3px 0; }
.doc-li::before { content: '—'; position: absolute; left: 0; color: var(--text-dim); font-size: 10px; top: 2px; }
.doc-code {
  background: var(--bg-deep); padding: 1px 5px; border-radius: 3px;
  font-family: var(--mono); font-size: 11px; color: var(--text);
  word-break: break-word; overflow-wrap: break-word;
  display: inline-block; max-width: 100%;
}
.doc-modal-body strong { color: var(--text); font-weight: 500; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty-title { font-family: var(--serif); font-size: 18px; color: var(--text); margin-bottom: 6px; }
</style>
</head>
<body>
<div class="layout">

  <!-- ── Main area ── -->
  <div class="main-area">
    <header>
      <div class="header-left">
        <span class="page-title">North Star</span>
        <span class="page-sub">project goals</span>
      </div>
      <div class="header-right">
        <button class="refresh-btn" onclick="showAddProject()" style="background:var(--accent-soft);color:var(--accent-deep);border-color:var(--accent)">+ node</button>
        <button class="refresh-btn" onclick="loadData()">↻ refresh</button>
        <span class="updated-at" id="updated-at">—</span>
      </div>
    </header>
    <div class="grid-wrap" style="position:relative">
      <div id="ns-graph-canvas"></div>
      <div class="ns-graph-toolbar">
        <button class="ns-graph-btn" onclick="fitGraph()">⊡ Fit</button>
        <button class="ns-graph-btn" onclick="resetLayout()">↺ Layout</button>
        <span style="font-family:var(--mono);font-size:10px;color:var(--text-dim);padding:0 4px">Right-click node for actions</span>
      </div>
    </div>

    <!-- Inline rename input (replaces prompt() which is blocked in iframe) -->
    <div id="ns-rename-wrap" style="display:none;position:fixed;z-index:500">
      <input id="ns-rename-input" type="text"
        style="background:var(--panel);border:2px solid var(--accent);border-radius:6px;
               padding:5px 10px;font-family:var(--serif);font-size:13px;font-weight:500;
               color:var(--text);outline:none;width:160px;box-shadow:0 4px 12px rgba(31,28,26,.18)"/>
    </div>

    <!-- Connect mode banner -->
    <div id="ns-connect-banner" style="display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);
      background:var(--accent-soft);border:1px solid var(--accent);border-radius:6px;
      padding:6px 16px;font-family:var(--mono);font-size:11px;color:var(--accent-deep);
      z-index:20;white-space:nowrap;pointer-events:none"></div>

    <!-- Right-click context menu -->
    <div class="ns-ctx-menu" id="ns-ctx-menu">
      <!-- Node actions (shown when right-clicking a node) -->
      <div id="ctx-node-items">
        <div class="ns-ctx-item" id="ctx-connect">⟷ Connect from here</div>
        <div class="ns-ctx-item" id="ctx-rename">✎ Rename</div>
        <div class="ns-ctx-item" id="ctx-layer-up">↑ Move to upper layer</div>
        <div class="ns-ctx-item" id="ctx-layer-down">↓ Move to lower layer</div>
        <div class="ns-ctx-item" id="ctx-setpath">⌂ Set directory path</div>
        <div class="ns-ctx-sep"></div>
        <div class="ns-ctx-item danger" id="ctx-delete">✕ Remove node</div>
      </div>
      <!-- Edge actions (shown when right-clicking an edge) -->
      <div id="ctx-edge-items" style="display:none">
        <div class="ns-ctx-item danger" id="ctx-remove-edge">✂ Remove connection</div>
      </div>
    </div>

    <!-- Add project modal -->
    <div class="ns-add-modal" id="ns-add-modal" onclick="if(event.target===this)hideAddProject()">
      <div class="ns-add-card">
        <div class="ns-add-title">Add project node</div>
        <div class="ns-add-field">
          <label class="ns-add-label">Project name</label>
          <input class="ns-add-input" id="add-proj-name" placeholder="e.g. MyProject" />
        </div>
        <div class="ns-add-field">
          <label class="ns-add-label">Directory path (optional)</label>
          <input class="ns-add-input" id="add-proj-path" placeholder="/home/desk-1/Project/MyProject" />
          <div class="ns-add-hint">Claude sessions in this dir will auto-link to this node</div>
        </div>
        <div class="ns-add-btns">
          <button class="ns-add-cancel" onclick="hideAddProject()">Cancel</button>
          <button class="ns-add-submit" onclick="submitAddProject()">Add node</button>
        </div>
      </div>
    </div>
  </div>


</div>

<!-- ── Detail overlay (centered modal) ── -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-modal" id="detail-modal">

    <!-- Header -->
    <div class="dm-header">
      <span class="dm-title" id="dm-title">—</span>
      <span class="dm-status-pill" id="dm-status-pill"></span>
      <button class="dm-close" onclick="closeDetail()">×</button>
    </div>

    <!-- Body: left = hierarchy, right = work + actions -->
    <div class="dm-body" id="dm-body">

      <!-- Left: Goal hierarchy -->
      <div class="dm-left" id="dm-left">
        <div style="padding:20px;color:var(--text-dim);font-family:var(--mono);font-size:12px">Loading…</div>
      </div>

      <!-- Right: Current work + actions -->
      <div class="dm-right" id="dm-right">
        <div style="padding:20px;color:var(--text-dim);font-family:var(--mono);font-size:12px">Loading…</div>
      </div>

    </div>

    <!-- Terminal panel (replaces dm-body when open) -->
    <div class="dm-terminal" id="dm-terminal">
      <div class="dm-terminal-hdr">
        <div class="dm-terminal-title">claude @ <span id="dm-term-proj">—</span></div>
        <button class="dm-terminal-back" onclick="killAndNewSession()" title="Kill and restart session">↺ new</button>
        <button class="dm-terminal-back" style="margin-left:4px;border-color:#c0392b;color:#e05252" onclick="killSession()" title="Kill session permanently">⬛ kill</button>
        <button class="dm-terminal-back" style="margin-left:6px" onclick="closeTerminal()">← back</button>
      </div>
      <div id="dm-xterm"></div>
    </div>

  </div>
</div>

<!-- Doc viewer overlay -->
<div class="doc-overlay" id="doc-overlay">
  <div class="doc-modal">
    <div class="doc-modal-header">
      <span class="doc-modal-title" id="doc-title">—</span>
      <button class="doc-modal-close" onclick="closeDoc()">×</button>
    </div>
    <div class="doc-modal-path" id="doc-path">—</div>
    <div class="doc-modal-body" id="doc-body"></div>
  </div>
</div>

<script>
let projects = [];
let activeIdx = null;

// ── Data ──────────────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const [projRes, ctxRes] = await Promise.all([
      fetch('/api/northstar'),
      fetch('/api/ctx-pulse').catch(() => ({ json: () => ({ ok: false, topics: [] }) })),
      refreshSessionStatus(),
    ]);
    projects = await projRes.json();
    const ctxData = await ctxRes.json();
    ctxTopics = ctxData.ok ? (ctxData.topics || []) : [];

    projects.forEach(p => {
      p.milestones = p.milestones || [];
      p.log        = p.log        || [];
      p.deadline   = p.deadline   || '';
    });

    render();
    document.getElementById('updated-at').textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });

    if (activeIdx !== null && projects[activeIdx]) {
      openDetail(activeIdx);
    }
  } catch(e) {
    console.error('loadData failed', e);
  }
}

// ── Gauge math ────────────────────────────────────────────────────────────────

function parseNum(s) {
  if (!s || s === '—' || s === '-') return null;
  const n = parseFloat(String(s).replace(/[^0-9.]/g, ''));
  return isNaN(n) ? null : n;
}

function calcPct(current, target) {
  const c = parseNum(current), t = parseNum(target);
  if (!t || c === null) return 0;
  return Math.min(1, c / t);
}

function gaugePath(pct, cx, cy, r) {
  if (pct <= 0) return `M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx - r + 0.01} ${cy}`;
  const p = Math.min(pct, 0.9995);
  const angle = Math.PI * (1 - p);
  const x = cx + r * Math.cos(angle);
  const y = cy - r * Math.sin(angle);
  const large = p > 0.5 ? 1 : 0;
  return `M ${cx - r} ${cy} A ${r} ${r} 0 ${large} 1 ${x.toFixed(2)} ${y.toFixed(2)}`;
}

function statusColor(status) {
  return { 'behind': 'var(--red)', 'on-track': 'var(--green)', 'achieved': 'var(--accent)', 'paused': 'var(--text-dim)' }[status] || 'var(--text-dim)';
}

// ── Card gauge SVG ────────────────────────────────────────────────────────────

function cardGaugeSvg(p) {
  const pct = calcPct(p.current, p.target);
  const cx = 52, cy = 52, r = 42;
  const bgPath = `M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`;
  const fgPath = gaugePath(pct, cx, cy, r);
  const color  = statusColor(p.status);
  const label  = `${Math.round(pct * 100)}%`;

  return `<svg class="gauge-svg" width="104" height="60" viewBox="0 0 104 60">
    <path class="gauge-track" d="${bgPath}" />
    <path class="gauge-fill" d="${fgPath}" stroke="${color}" />
    <text x="${cx}" y="${cy - 10}" text-anchor="middle" class="gauge-center-text">
      <tspan class="gauge-value" fill="${color}">${label}</tspan>
    </text>
    <text x="${cx}" y="${cy - 2}" text-anchor="middle">
      <tspan class="gauge-label">of target</tspan>
    </text>
  </svg>`;
}

// ── Milestone pipeline (card) ─────────────────────────────────────────────────

function cardMilestonePipeline(milestones, status) {
  if (!milestones.length) return '';
  const done = milestones.filter(m => m.done).length;
  const MAX_SHOW = 6;
  const shown = milestones.slice(0, MAX_SHOW);
  const color = statusColor(status);

  // Determine active (first not-done)
  const activeI = milestones.findIndex(m => !m.done);

  const nodes = shown.map((m, i) => {
    const isDone   = m.done;
    const isActive = i === activeI;
    const dotClass = isDone ? 'done' : (isActive ? 'active' : 'pending');
    const textClass = isDone ? 'done' : (isActive ? 'active' : '');
    const lineClass = isDone ? 'done' : '';
    const label = (m.text || '').split(':')[0].replace(/Phase\s*/i, 'Ph').substring(0, 8);
    const connector = i < shown.length - 1
      ? `<div class="ms-line ${lineClass}"></div>` : '';
    return `<div class="ms-node">
      <div class="ms-dot-wrap">
        <div class="ms-dot ${dotClass}"></div>
      </div>
      <div class="ms-text ${textClass}">${esc(label)}</div>
    </div>${connector}`;
  }).join('');

  return `<div class="ms-pipeline">${nodes}</div>`;
}

// ── Card current-step strip ──────────────────────────────────────────────────

function cardCurrentStep(p) {
  const activeMilestone = p.milestones.find(m => !m.done);
  const lastLog = p.log && p.log.length ? p.log[p.log.length - 1] : null;

  // Gap line: shows current state relative to goal
  const pct = calcPct(p.current, p.target);
  const gapColor = p.status === 'behind' ? 'var(--red)' : p.status === 'on-track' ? 'var(--green)' : 'var(--text-dim)';

  // Gap description — what's between now and goal
  let gapText = '';
  if (p.current && p.current !== '—' && p.target && p.target !== '—') {
    const c = parseNum(p.current), t = parseNum(p.target);
    if (c !== null && t !== null && t > 0) {
      const remaining = t - c;
      const unit = p.unit || '';
      if (remaining > 0) {
        gapText = `${formatGapNum(remaining)}${unit} to go`;
      } else {
        gapText = 'goal reached';
      }
    }
  }

  // Active step label
  let stepText = activeMilestone ? activeMilestone.text : '';
  stepText = stepText.replace(/^Phase\s+\d+\s+v?\d*[a-z]?:\s*/i, '').trim();
  if (stepText.length > 36) stepText = stepText.slice(0, 34) + '…';

  const logDate = lastLog ? lastLog.date?.slice(5) : '';

  if (!activeMilestone && !lastLog && !gapText) return '';

  return `<div class="card-current-step">
    <div class="cs-main">
      ${gapText ? `<span class="cs-gap" style="color:${gapColor}">${esc(gapText)}</span>` : ''}
      ${activeMilestone ? `<span class="cs-step">▶ ${esc(stepText)}</span>` : ''}
    </div>
    ${lastLog ? `<span class="cs-date">${esc(logDate)}</span>` : ''}
  </div>`;
}

function formatGapNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n % 1 === 0 ? String(n) : n.toFixed(1);
}

// ── Table row HTML ────────────────────────────────────────────────────────────

function rowHtml(p, i) {
  const statusKey = p.status || 'paused';
  const pct       = calcPct(p.current, p.target);
  const pctNum    = Math.round(pct * 100);
  const color     = statusColor(p.status);
  const active    = i === activeIdx ? 'active' : '';

  // Gap text
  let gapText = '—', gapColor = 'var(--text-dim)';
  if (p.current && p.current !== '—' && p.target && p.target !== '—') {
    const c = parseNum(p.current), t = parseNum(p.target);
    if (c !== null && t !== null) {
      const rem = t - c;
      const u = p.unit || '';
      gapText = rem > 0 ? `${formatGapNum(rem)}${u}` : 'done';
      gapColor = p.status === 'behind' ? 'var(--red)' : p.status === 'on-track' ? 'var(--green)' : 'var(--text-dim)';
    }
  }

  // Active step
  const activeMilestone = p.milestones.find(m => !m.done);
  let stepText = activeMilestone ? activeMilestone.text : '';
  stepText = stepText.replace(/^Phase\s+\d+\s+v?\d*[a-z]?:\s*/i, '').trim();
  if (stepText.length > 34) stepText = stepText.slice(0, 32) + '…';

  // Last update date
  const lastLog = p.log && p.log.length ? p.log[p.log.length - 1] : null;
  const logDate = lastLog ? (lastLog.date || '').slice(5) : '—';

  // Status dot color
  const dotColor = statusColor(statusKey);

  return `<tr class="${active}" data-idx="${i}" draggable="true">
    <td class="col-num">${i + 1}</td>
    <td class="col-drag"><span class="drag-handle" title="Drag to reorder">⠿</span></td>
    <td class="col-name"><span class="row-name">${esc(p.name)}</span></td>
    <td class="col-status">
      <span class="status-label ${statusKey}">
        <span class="row-status-dot" style="background:${dotColor}"></span>
        ${STATUS_LABEL[statusKey] || statusKey}
      </span>
    </td>
    <td class="col-metric hide-mobile" title="${esc(p.metric || '')}">
      ${esc((p.metric || '—').substring(0, 26))}
    </td>
    <td class="col-progress">
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pctNum}%;background:${color}"></div>
        </div>
        <span class="progress-num">${pctNum}%</span>
      </div>
    </td>
    <td class="col-gap hide-mobile" style="color:${gapColor}">${esc(gapText)}</td>
    <td class="col-step hide-mobile">${stepText ? `▶ ${esc(stepText)}` : '<span style="color:var(--text-dim)">—</span>'}</td>
    <td class="col-date">${esc(logDate)}</td>
  </tr>`;
}

// ── Milestone Creator ─────────────────────────────────────────────────────────
let _msProjectId = null;

async function loadMilestones(projId) {
  _msProjectId = projId;
  const el = document.getElementById('dm-ms-creator');
  if (!el) return;
  try {
    const r = await fetch(`/api/northstar/${encodeURIComponent(projId)}/milestones`);
    const data = await r.json();
    renderMilestoneCreator(projId, data.milestones || []);
  } catch(_) {
    if (el) el.innerHTML = '<span style="color:var(--text-dim)">Failed to load milestones</span>';
  }
}

function renderMilestoneCreator(projId, milestones) {
  const el = document.getElementById('dm-ms-creator');
  if (!el) return;

  const l0 = milestones.filter(m => (m.layer || 0) === 0);
  const l1 = milestones.filter(m => (m.layer || 0) === 1);

  // Update ack badge
  const acked = milestones.filter(m => m.claude_ack).length;
  const badge = document.getElementById('dm-ms-ack-badge');
  if (badge) badge.textContent = acked > 0 ? `◈ ${acked}/${milestones.length} ack'd` : '';

  if (!milestones.length) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:11px">No milestones yet — add one below.</div>';
    return;
  }

  el.innerHTML = l0.map(m => {
    const children = l1.filter(c => c.parent_id === m.id);
    const ack = m.claude_ack
      ? `<span class="ms-ack acked">◈ ${String(m.claude_ack).slice(5,10)}</span>`
      : `<span class="ms-ack unread">○ unread</span>`;
    const doneClass = m.done ? 'done' : '';
    const toggle = m.done ? '✓' : '○';

    const childHtml = children.map(c => {
      const cack = c.claude_ack
        ? `<span class="ms-ack acked">◈ ${String(c.claude_ack).slice(5,10)}</span>`
        : `<span class="ms-ack unread">○</span>`;
      return `<div class="ms-item layer-1">
        <button class="ms-toggle ${c.done?'done':''}" onclick="toggleMs('${esc(projId)}','${esc(c.id)}')">${c.done?'✓':'○'}</button>
        <div class="ms-text-wrap">
          <div class="ms-text ${c.done?'done':''}" contenteditable="true"
            onblur="saveMs('${esc(projId)}','${esc(c.id)}',this.textContent)"
            >${esc(c.text)}</div>
        </div>
        ${cack}
        <button class="ms-del" onclick="deleteMs('${esc(projId)}','${esc(c.id)}')" title="Delete">✕</button>
      </div>`;
    }).join('');

    return `<div class="ms-item">
      <button class="ms-toggle ${doneClass}" onclick="toggleMs('${esc(projId)}','${esc(m.id)}')">${toggle}</button>
      <div class="ms-text-wrap">
        <div class="ms-text ${doneClass}" contenteditable="true"
          onblur="saveMs('${esc(projId)}','${esc(m.id)}',this.textContent)"
          >${esc(m.text)}</div>
        <button class="ms-add-sub" onclick="addMilestone('${esc(projId)}',1,'${esc(m.id)}')">+ sub-milestone</button>
      </div>
      ${ack}
      <button class="ms-del" onclick="deleteMs('${esc(projId)}','${esc(m.id)}')" title="Delete">✕</button>
    </div>${childHtml}`;
  }).join('');
}

async function toggleMs(projId, mid) {
  const r = await fetch(`/api/northstar/${encodeURIComponent(projId)}/milestones/${encodeURIComponent(mid)}`);
  const data = await r.json();
  const ms = data.milestones?.find(m => m.id === mid);
  if (!ms) { await loadMilestones(projId); return; }
  await fetch(`/api/northstar/${encodeURIComponent(projId)}/milestones/${encodeURIComponent(mid)}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({done: !ms.done}),
  });
  await loadMilestones(projId);
}

async function saveMs(projId, mid, text) {
  const status = document.getElementById('dm-ms-save-status');
  if (status) status.textContent = 'saving…';
  await fetch(`/api/northstar/${encodeURIComponent(projId)}/milestones/${encodeURIComponent(mid)}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({text: text.trim()}),
  });
  if (status) { status.textContent = 'saved'; setTimeout(() => { if(status) status.textContent=''; }, 1500); }
}

async function addMilestone(projId, layer, parentId) {
  await fetch(`/api/northstar/${encodeURIComponent(projId)}/milestones`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({layer, parent_id: parentId, text: 'New milestone'}),
  });
  await loadMilestones(projId);
  // Focus the new item for immediate editing
  setTimeout(() => {
    const items = document.querySelectorAll('#dm-ms-creator .ms-text');
    if (items.length) items[items.length - 1].focus();
  }, 100);
}

async function deleteMs(projId, mid) {
  await fetch(`/api/northstar/${encodeURIComponent(projId)}/milestones/${encodeURIComponent(mid)}`, {
    method: 'DELETE',
  });
  await loadMilestones(projId);
}

// Reload from API for toggleMs (need current state)
(async function() {
  const orig = window.toggleMs;
  window.toggleMs = async (projId, mid) => {
    const r = await fetch(`/api/northstar/${encodeURIComponent(projId)}/milestones`);
    const data = await r.json();
    const ms = (data.milestones || []).find(m => m.id === mid);
    if (!ms) return;
    await fetch(`/api/northstar/${encodeURIComponent(projId)}/milestones/${encodeURIComponent(mid)}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({done: !ms.done}),
    });
    await loadMilestones(projId);
  };
})();

async function _openWithTerminal(origIdx, projId) {
  activeIdx = origIdx;
  render();
  await openDetail(origIdx);
  openTerminal(projId);
}

async function refreshSessionStatus() {
  try {
    const r = await fetch('/api/northstar/sessions');
    _sessionStatus = await r.json();
  } catch(_) {}
}

function sessCell(projId) {
  const s = _sessionStatus[projId];
  if (!s || s === 'dead') return `<span class="sess-dot sess-none"><span class="sess-indicator"></span>—</span>`;
  if (s === 'active') return `<span class="sess-dot sess-active"><span class="sess-indicator"></span>live</span>`;
  if (s.startsWith('idle:')) {
    const secs = parseInt(s.split(':')[1]);
    const label = secs < 60 ? `${secs}s` : secs < 3600 ? `${Math.round(secs/60)}m` : `${Math.round(secs/3600)}h`;
    return `<span class="sess-dot sess-idle"><span class="sess-indicator"></span>${label}</span>`;
  }
  return `<span class="sess-dot sess-none"><span class="sess-indicator"></span>—</span>`;
}

// ── Node graph (vis-network) ──────────────────────────────────────────────────

let _network = null;
let _visNodes = null;
let _visEdges = null;
let _connectMode = false;
let _posDebounce = null;

function nodeColor(status) {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const map = {
    'on-track': { bg: dark ? '#0e2318' : '#e8f5ee', border: '#3d8b5e', font: dark ? '#4caf78' : '#2d6b44' },
    'behind':   { bg: dark ? '#250e0e' : '#fdf0ef', border: '#c0392b', font: dark ? '#e05252' : '#922b21' },
    'achieved': { bg: dark ? '#2a1e17' : '#f5e6de', border: '#cc785c', font: dark ? '#e8926e' : '#a34b2c' },
    'paused':   { bg: dark ? '#1e1c1a' : '#f5f2ec', border: '#8a8278', font: dark ? '#b0a89e' : '#5a5450' },
  };
  return map[status] || map['paused'];
}

function buildVisData() {
  const visNodes = [], visEdges = [], seenEdges = new Set();
  projects.forEach((p, i) => {
    const pct = Math.round(calcPct(p.current, p.target) * 100);
    const col = nodeColor(p.status || 'paused');
    let gapText = `${pct}%`;
    if (p.current && p.current !== '—' && p.target && p.target !== '—') {
      const c = parseNum(p.current), t = parseNum(p.target);
      if (c !== null && t !== null) {
        const rem = t - c;
        gapText = rem > 0 ? `${formatGapNum(rem)}${p.unit||''}` : 'done';
      }
    }
    const lastLog = p.log?.length ? p.log[p.log.length-1] : null;
    const dateStr = lastLog ? (lastLog.date||'').slice(5) : '';
    const sessDot = _sessionStatus[p.id||p.name] === 'active' ? '● ' : '';
    const label = `${sessDot}${p.name}\n${gapText}${dateStr ? '  '+dateStr : ''}`;

    const node = {
      id: p.id || p.name,
      label,
      level: Math.min(2, Math.max(0, parseInt(p.layer) || 0)),  // tree level from layer field
      color: { background: col.bg, border: col.border,
               highlight: { background: col.bg, border: '#cc785c' },
               hover: { background: col.bg, border: '#cc785c' } },
      font: { color: col.font, size: 12, face: '"JetBrains Mono", ui-monospace, monospace',
              multi: false },
      shape: 'box',
      borderWidth: p.status === 'on-track' ? 2 : 1.5,
      borderWidthSelected: 3,
      margin: { top: 7, right: 10, bottom: 7, left: 10 },
      shadow: { enabled: false },
      _idx: i,
    };
    if (i === activeIdx) {
      node.borderWidth = 3;
      node.color.border = '#cc785c';
      node.shadow = { enabled: true, color: 'rgba(204,120,92,0.3)', size: 8, x: 0, y: 0 };
    }
    visNodes.push(node);
    // Build edges from connections field
    (p.connections || []).forEach(targetId => {
      const edgeKey = [p.id||p.name, targetId].sort().join('|');
      if (!seenEdges.has(edgeKey)) {
        seenEdges.add(edgeKey);
        visEdges.push({
          id: edgeKey,
          from: p.id || p.name,
          to: targetId,
          color: { color: '#c4bdb5', highlight: '#cc785c', hover: '#cc785c', opacity: 0.7 },
          width: 1.5, selectionWidth: 2.5,
          smooth: { type: 'curvedCW', roundness: 0.15 },
          arrows: { to: { enabled: true, scaleFactor: 0.6 } },
        });
      }
    });
    // Also draw parent link if set
    if (p.parent && p.parent !== (p.id||p.name)) {
      const edgeKey = [p.id||p.name, p.parent].sort().join('|');
      if (!seenEdges.has(edgeKey)) {
        seenEdges.add(edgeKey);
        visEdges.push({
          id: edgeKey,
          from: p.parent, to: p.id||p.name,
          dashes: [5, 3],
          color: { color: '#c4bdb5', opacity: 0.5 },
          width: 1, arrows: { to: { enabled: true, scaleFactor: 0.5 } },
        });
      }
    }
  });
  return { visNodes, visEdges };
}

function render() {
  if (!projects.length) return;
  const { visNodes, visEdges } = buildVisData();

  if (!_network) {
    // Initial render — create network
    _visNodes = new vis.DataSet(visNodes);
    _visEdges = new vis.DataSet(visEdges);
    const container = document.getElementById('ns-graph-canvas');
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    // Always use hierarchical tree layout — level driven by project.layer (0/1/2)
    _network = new vis.Network(container, { nodes: _visNodes, edges: _visEdges }, {
      layout: {
        hierarchical: {
          enabled: true,
          direction: 'UD',
          sortMethod: 'directed',
          levelSeparation: 130,
          nodeSpacing: 170,
          treeSpacing: 220,
          blockShifting: true,
          edgeMinimization: true,
          parentCentralization: true,
        }
      },
      physics: { enabled: false },
      interaction: {
        hover: true, tooltipDelay: 300,
        dragNodes: true, dragView: true, zoomView: true,
        multiselect: false,
      },
      manipulation: { enabled: false },
      edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 } },
    });

    // Focus canvas so right-click works immediately (cold right-click fix)
    container.setAttribute('tabindex', '0');
    container.focus();

    // Layer band labels drawn behind nodes
    _network.on('beforeDrawing', ctx => {
      drawLayerBands(ctx);
    });

    // Tree layout auto-positions — fit to view after initial layout completes
    _network.once('afterDrawing', () => {
      setTimeout(() => _network.fit({ animation: { duration: 300 } }), 80);
    });

    // Node click → detail (or finish connect if in connect mode)
    _network.on('click', params => {
      if (params.nodes.length === 1) {
        const nodeId = params.nodes[0];
        if (_connectingFrom) { finishConnect(nodeId); return; }  // connect mode
        const idx = projects.findIndex(p => (p.id||p.name) === nodeId);
        if (idx < 0) return;
        if (activeIdx === idx) { closeDetail(); return; }
        activeIdx = idx;
        render();
        openDetail(idx);
      } else if (params.nodes.length === 0 && params.edges.length === 0) {
        if (_connectingFrom) { cancelConnect(); return; }
        if (activeIdx !== null) { closeDetail(); }
      }
    });

    // Double-click → rename
    _network.on('doubleClick', params => {
      if (params.nodes.length === 1) showRenameInput(params.nodes[0]);
    });

    // Right-click → context menu
    // Fix: bind mousedown(button=2) not contextmenu — avoids cold-click focus issue
    container.addEventListener('mousedown', e => {
      if (e.button !== 2) return;
      e.preventDefault();
      container.focus();
      setTimeout(() => {
        const pos = { x: e.offsetX, y: e.offsetY };
        const nodeId = _network.getNodeAt(pos);
        if (nodeId !== undefined) { showCtxMenu(e.clientX, e.clientY, nodeId, null); return; }
        const edgeId = _network.getEdgeAt(pos);
        if (edgeId !== undefined) { showCtxMenu(e.clientX, e.clientY, null, edgeId); return; }
      }, 10);
    });
    container.addEventListener('contextmenu', e => e.preventDefault());

    // Save position after manual drag
    _network.on('dragEnd', params => {
      if (params.nodes.length) {
        clearTimeout(_posDebounce);
        _posDebounce = setTimeout(savePositions, 800);
      }
    });

  } else {
    // Subsequent renders — update data
    _visNodes.update(visNodes);
    _visEdges.update(visEdges);
    // Add new edges (e.g., after reconnect)
    const existingIds = new Set(_visEdges.getIds());
    visEdges.forEach(e => { if (!existingIds.has(e.id)) _visEdges.add(e); });
    // Remove deleted edges
    const newIds = new Set(visEdges.map(e => e.id));
    _visEdges.getIds().forEach(id => { if (!newIds.has(id)) _visEdges.remove(id); });
  }
}

function savePositions() {
  if (!_network) return;
  const positions = _network.getPositions();
  projects.forEach(p => {
    const pid = p.id || p.name;
    if (positions[pid]) {
      const { x, y } = positions[pid];
      if (Math.abs((p.x||0) - x) > 2 || Math.abs((p.y||0) - y) > 2) {
        p.x = Math.round(x); p.y = Math.round(y);
        fetch(`/api/northstar/${encodeURIComponent(pid)}/layout`, {
          method: 'PATCH', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ x: p.x, y: p.y }),
        }).catch(() => {});
      }
    }
  });
}

async function moveLayer(delta) {
  if (!_ctxNodeId) return;
  hideCtxMenu();
  const p = projects.find(x => (x.id||x.name) === _ctxNodeId);
  if (!p) return;
  const newLayer = Math.min(2, Math.max(0, (parseInt(p.layer) || 0) + delta));
  if (newLayer === (parseInt(p.layer) || 0)) return;
  await fetch(`/api/northstar/${encodeURIComponent(_ctxNodeId)}/layout`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ layer: newLayer }),
  });
  p.layer = newLayer;
  // Rebuild network to apply new level
  if (_network) { _network.destroy(); _network = null; }
  render();
  setTimeout(() => fitGraph(), 400);
}

function showRenameInput(nodeId) {
  const p = projects.find(x => (x.id||x.name) === nodeId);
  if (!p || !_network) return;
  // Position input over the node
  const pos = _network.getPositions([nodeId])[nodeId];
  if (!pos) return;
  const dom = _network.canvasToDOM(pos);
  const wrap = document.getElementById('ns-rename-wrap');
  const input = document.getElementById('ns-rename-input');
  input.value = p.name;
  wrap.style.left = `${dom.x - 80}px`;
  wrap.style.top  = `${dom.y - 16}px`;
  wrap.style.display = 'block';
  input.focus();
  input.select();

  const finish = async () => {
    wrap.style.display = 'none';
    input.removeEventListener('keydown', onKey);
    input.removeEventListener('blur', finish);
    const newName = input.value.trim();
    if (newName && newName !== p.name) await commitRenameById(nodeId, newName);
  };
  const onKey = (e) => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') { wrap.style.display = 'none'; input.removeEventListener('keydown', onKey); input.removeEventListener('blur', finish); }
  };
  input.addEventListener('keydown', onKey);
  input.addEventListener('blur', finish);
}

function showInlineInput(label, initial, onConfirm) {
  const val = window._inlinePrompt ? window._inlinePrompt(label, initial) : initial;
  // Fallback: simple in-canvas prompt using the rename overlay repurposed
  const wrap = document.getElementById('ns-rename-wrap');
  const input = document.getElementById('ns-rename-input');
  input.value = initial;
  input.placeholder = label;
  wrap.style.left = '50%';
  wrap.style.top = '50%';
  wrap.style.transform = 'translate(-50%,-50%)';
  wrap.style.display = 'block';
  input.focus();
  input.select();
  const finish = async () => {
    wrap.style.display = 'none';
    wrap.style.transform = '';
    input.removeEventListener('keydown', onKey);
    input.removeEventListener('blur', finish);
    await onConfirm(input.value);
  };
  const onKey = (e) => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') { wrap.style.display = 'none'; wrap.style.transform = ''; input.removeEventListener('keydown', onKey); input.removeEventListener('blur', finish); }
  };
  input.addEventListener('keydown', onKey);
  input.addEventListener('blur', finish);
}

// ── Layer band rendering ──────────────────────────────────────────────────────
const LAYER_LABELS = ['Strategic', 'Domain', 'Execution'];
const LAYER_COLORS_LIGHT = ['rgba(204,120,92,0.06)', 'rgba(61,139,94,0.05)', 'rgba(44,111,173,0.05)'];
const LAYER_COLORS_DARK  = ['rgba(204,120,92,0.08)', 'rgba(76,175,120,0.06)', 'rgba(91,155,213,0.06)'];

function drawLayerBands(ctx) {
  if (!_network || !projects.length) return;
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const colors = dark ? LAYER_COLORS_DARK : LAYER_COLORS_LIGHT;
  const textColor = dark ? 'rgba(176,168,158,0.65)' : 'rgba(110,100,90,0.7)';

  const byLevel = {0: [], 1: [], 2: []};
  projects.forEach(p => {
    byLevel[Math.min(2, Math.max(0, parseInt(p.layer) || 0))].push(p.id || p.name);
  });

  const positions = _network.getPositions();
  const BAND_HALF = 55;
  const canvas = ctx.canvas;

  [0, 1, 2].forEach(lvl => {
    const ids = byLevel[lvl].filter(id => positions[id]);
    if (!ids.length) return;
    const ys = ids.map(id => positions[id].y);
    const midY = ys.reduce((a, b) => a + b, 0) / ys.length;

    // Band in canvas-space (very wide)
    ctx.save();
    ctx.fillStyle = colors[lvl];
    ctx.fillRect(-10000, midY - BAND_HALF, 20000, BAND_HALF * 2);
    ctx.restore();

    // Label in screen-space (reset transform) so it always appears at left edge
    const domMid = _network.canvasToDOM({ x: 0, y: midY });
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0); // screen space
    ctx.font = 'bold 9px "JetBrains Mono", monospace';
    ctx.fillStyle = textColor;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(LAYER_LABELS[lvl].toUpperCase(), 8, domMid.y);
    ctx.restore();
  });
}

function nodeHtml(p, idx) {
  const pct = Math.round(calcPct(p.current, p.target) * 100);
  const color = statusColor(p.status);
  const dotColor = statusColor(p.status || 'paused');
  const lastLog = p.log?.length ? p.log[p.log.length - 1] : null;
  const logDate = lastLog ? (lastLog.date || '').slice(5) : '—';
  let gapText = '', gapColor = 'var(--text-dim)';
  if (p.current && p.current !== '—' && p.target && p.target !== '—') {
    const c = parseNum(p.current), t = parseNum(p.target);
    if (c !== null && t !== null) {
      const rem = t - c;
      gapText = rem > 0 ? `${formatGapNum(rem)}${p.unit||''}` : 'done';
      gapColor = p.status === 'behind' ? 'var(--red)' : p.status === 'on-track' ? 'var(--green)' : 'var(--text-dim)';
    }
  }
  const sKey = _sessionStatus[p.id || p.name];
  const sessClass = sKey === 'active' ? 'live' : '';
  const sessDot = sKey === 'active' ? '●' : sKey?.startsWith('idle') ? '○' : '·';
  const active = idx === activeIdx ? 'active' : '';
  return `<div class="ns-node ${active}" data-proj-idx="${idx}" data-proj-id="${esc(p.id||p.name)}" data-layer="${p.layer||0}" draggable="true">
    <div class="ns-node-top">
      <span class="ns-node-sdot" style="background:${dotColor}"></span>
      <span class="ns-node-name" contenteditable="false"
        ondblclick="startRename(this,'${esc(p.id||p.name)}')"
        onblur="commitRename(this,'${esc(p.id||p.name)}')"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
        >${esc(p.name)}</span>
      <span class="ns-node-sess-dot ${sessClass}" title="Click for terminal"
        onclick="event.stopPropagation();_openWithTerminal(${idx},'${esc(p.id||p.name)}')">${sessDot}</span>
    </div>
    <div class="ns-node-bar-wrap">
      <div class="ns-node-bar" style="width:${pct}%;background:${color}"></div>
    </div>
    <div class="ns-node-bottom">
      <span class="ns-node-gap" style="color:${gapColor}">${esc(gapText || `${pct}%`)}</span>
      <span class="ns-node-date">${esc(logDate)}</span>
    </div>
  </div>`;
}

function drawConnections() {
  const svg = document.getElementById('ns-conn-svg');
  if (!svg) return;
  const swimlane = document.getElementById('ns-swimlane');
  const containerRect = swimlane.getBoundingClientRect();

  const paths = [];
  projects.forEach((p, i) => {
    if (!p.parent) return;
    const parentIdx = projects.findIndex(x => (x.id||x.name) === p.parent);
    if (parentIdx < 0) return;
    const childEl = document.querySelector(`.ns-node[data-proj-idx="${i}"]`);
    const parentEl = document.querySelector(`.ns-node[data-proj-idx="${parentIdx}"]`);
    if (!childEl || !parentEl) return;
    const cR = childEl.getBoundingClientRect();
    const pR = parentEl.getBoundingClientRect();
    const x1 = pR.left + pR.width / 2 - containerRect.left;
    const y1 = pR.bottom - containerRect.top;
    const x2 = cR.left + cR.width / 2 - containerRect.left;
    const y2 = cR.top - containerRect.top;
    const mid = (y1 + y2) / 2;
    paths.push(`<path d="M${x1},${y1} C${x1},${mid} ${x2},${mid} ${x2},${y2}"
      stroke="var(--panel-border)" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>`);
  });
  svg.innerHTML = paths.join('');
}

function openTerminal(projId) {
  document.getElementById('dm-body').style.display = 'none';
  const panel = document.getElementById('dm-terminal');
  panel.classList.add('show');
  document.getElementById('dm-term-proj').textContent = projId;

  // Init xterm once
  if (!_term) {
    _term = new Terminal({
      cursorBlink: true,
      fontFamily: '"JetBrains Mono", ui-monospace, monospace',
      fontSize: 13,
      lineHeight: 1.4,
      scrollback: 3000,
      fastScrollSensitivity: 8,
      scrollSensitivity: 3,
      allowTransparency: false,
      convertEol: false,
      theme: {
        background: '#1a1916', foreground: '#d4cfc8', cursor: '#cc785c',
        selectionBackground: '#3d3730',
        black: '#1a1916',       brightBlack:   '#666260',
        red: '#c0392b',         brightRed:     '#e74c3c',
        green: '#3d8b5e',       brightGreen:   '#27ae60',
        yellow: '#b8860b',      brightYellow:  '#f0c040',
        blue: '#2c6fad',        brightBlue:    '#5dade2',
        magenta: '#8e44ad',     brightMagenta: '#a569bd',
        cyan: '#17a589',        brightCyan:    '#1abc9c',
        white: '#d4cfc8',       brightWhite:   '#faf9f6',
      },
    });
    _termFit = new FitAddon.FitAddon();
    _term.loadAddon(_termFit);
    _term.open(document.getElementById('dm-xterm'));
  } else {
    _term.clear();
  }

  // Small delay so the container has its final size before fit
  setTimeout(() => { _termFit.fit(); }, 60);

  // WebSocket
  if (_termWs) { _termWs.close(); _termWs = null; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws/session/${encodeURIComponent(projId)}`);
  _termWs = ws;

  _term.onData(data => { if (ws.readyState === 1) ws.send(data); });

  // Batch incoming chunks into one write per animation frame (reduces repaints)
  let _wsBatch = '';
  let _wsRaf = null;
  ws.onmessage = e => {
    _wsBatch += e.data;
    if (!_wsRaf) _wsRaf = requestAnimationFrame(() => {
      if (_wsBatch) { _term.write(_wsBatch); _wsBatch = ''; }
      _wsRaf = null;
    });
  };
  ws.onopen    = () => { _termFit.fit(); _sendResize(ws); };
  ws.onclose   = () => _term.write('\r\n\x1b[33m[session closed]\x1b[0m\r\n');
  ws.onerror   = () => _term.write('\r\n\x1b[31m[connection error — is hub server running?]\x1b[0m\r\n');

  // Resize observer
  if (_termRo) _termRo.disconnect();
  _termRo = new ResizeObserver(() => {
    _termFit?.fit();
    if (ws.readyState === 1) _sendResize(ws);
  });
  _termRo.observe(document.getElementById('dm-xterm'));
}

function _sendResize(ws) {
  if (!_term || ws.readyState !== 1) return;
  ws.send(`\x00resize:${_term.cols},${_term.rows}`);
}

function closeTerminal() {
  if (_termRo) { _termRo.disconnect(); _termRo = null; }
  // Detach WS without killing — session persists server-side for reconnect
  if (_termWs) { _termWs.close(); _termWs = null; }
  document.getElementById('dm-terminal').classList.remove('show');
  document.getElementById('dm-body').style.display = '';
}

function killSession() {
  if (_termWs && _termWs.readyState === 1) _termWs.send('\x00kill-session');
  setTimeout(() => {
    if (_termWs) { _termWs.close(); _termWs = null; }
    closeTerminal();
  }, 300);
}

function killAndNewSession() {
  const projId = document.getElementById('dm-term-proj').textContent;
  // Send kill signal before closing
  if (_termWs && _termWs.readyState === 1) {
    _termWs.send('\x00kill-session');
  }
  // Brief delay to let server ack, then reopen fresh
  setTimeout(() => {
    if (_termWs) { _termWs.close(); _termWs = null; }
    if (_term) _term.clear();
    openTerminal(projId);
  }, 300);
}

  renderHierarchy(p);
  document.getElementById('dm-right').innerHTML =
    '<div style="padding:20px;color:var(--text-dim);font-family:var(--mono);font-size:12px">Loading…</div>';

  // Fetch OKRs + CTX + doc in parallel
  const [okrData, ctxData, docData] = await Promise.all([
    fetch(`/api/northstar/${esc(p.id)}/okrs`).then(r=>r.json()).catch(()=>({ok:false,okrs:[]})),
    fetch('/api/ctx-pulse').then(r=>r.json()).catch(()=>({ok:false,topics:[]})),
    fetch(`/api/northstar/${esc(p.id)}/doc`).then(r=>r.json()).catch(()=>({ok:false})),
  ]);

  if (ctxData.ok) ctxTopics = ctxData.topics || [];

  // Update OKR section in left column
  const okrSection = document.getElementById('dm-okr-section');
  if (okrSection) {
    const okrs = okrData.okrs || [];
    const title = okrData.section || 'OKRs';
    okrSection.innerHTML = `
      <div class="dm-layer">
        <div class="dm-layer-head">
          <div class="dm-layer-icon okr" title="Quarterly OKRs">K</div>
          <span class="dm-layer-title">${esc(title)}</span>
          <span class="dm-layer-count">${okrs.length} KRs</span>
        </div>
        <div class="dm-okr-list">${okrs.length ? okrs.map(kr => {
          const m = kr.match(/^(K\d+):\s*(.+)/);
          return `<div class="dm-okr-item">
            <span class="dm-okr-key">${m ? esc(m[1]) : '·'}</span>
            <span class="dm-okr-text">${m ? esc(m[2]) : esc(kr)}</span>
          </div>`;
        }).join('') : '<div style="font-size:12px;color:var(--text-dim)">No OKRs defined in spec doc</div>'}</div>
      </div>`;
  }

  // Render right column then load milestones
  renderRight(p, ctxData.topics || [], docData);
  loadMilestones(p.id);

  // Alignment is manual — user clicks ↻ Refresh to run
}
